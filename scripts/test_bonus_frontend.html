<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>附加项 API 测试</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>附加项管理 API 测试</h1>
    
    <div class="test-section">
        <h2>测试1: 创建附加项</h2>
        <button onclick="testCreate()">POST /api/bonus</button>
        <div id="result1"></div>
    </div>
    
    <div class="test-section">
        <h2>测试2: 获取列表（预期失败）</h2>
        <button onclick="testList()">GET /api/bonus/list?taskId=1</button>
        <div id="result2"></div>
    </div>
    
    <div class="test-section">
        <h2>测试3: 更新附加项</h2>
        <button onclick="testUpdate()">POST /api/bonus (更新)</button>
        <div id="result3"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5031/api';
        
        async function testCreate() {
            const result = document.getElementById('result1');
            result.innerHTML = '请求中...';
            
            try {
                const response = await fetch(`${API_BASE}/bonus`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        taskId: 1,
                        institutionId: 1,
                        directorPresentation: 1,
                        secretaryParticipation: 0
                    })
                });
                
                const data = await response.json();
                result.innerHTML = `
                    <p class="success">✓ 成功 (${response.status})</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                result.innerHTML = `<p class="error">✗ 失败: ${error.message}</p>`;
            }
        }
        
        async function testList() {
            const result = document.getElementById('result2');
            result.innerHTML = '请求中...';
            
            try {
                const response = await fetch(`${API_BASE}/bonus/list?taskId=1`);
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `
                        <p class="success">✓ 成功 (${response.status})</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `
                        <p class="error">✗ 失败 (${response.status})</p>
                        <p>接口不存在，需要后端实现</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                result.innerHTML = `<p class="error">✗ 失败: ${error.message}</p>`;
            }
        }
        
        async function testUpdate() {
            const result = document.getElementById('result3');
            result.innerHTML = '请求中...';
            
            try {
                const response = await fetch(`${API_BASE}/bonus`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        taskId: 1,
                        institutionId: 1,
                        directorPresentation: 1,
                        secretaryParticipation: 1
                    })
                });
                
                const data = await response.json();
                result.innerHTML = `
                    <p class="success">✓ 成功 (${response.status})</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                result.innerHTML = `<p class="error">✗ 失败: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
